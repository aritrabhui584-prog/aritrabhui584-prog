name: Generate Snake

on:
  schedule:
    # every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Generates the snake  
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: aritrabhui584-prog
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Configure git
      - name: Configure git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      # Checkout output branch, merge changes, and push
      - name: Deploy to output branch
        run: |
          git fetch origin output || true
          git checkout output || git checkout -b output
          cp -r dist/* .
          git add github-contribution-grid-snake.gif github-contribution-grid-snake.svg
          if ! git diff --cached --quiet; then
            git commit -m "Automated snake animation update"
            git pull --rebase origin output || true
            git push origin output
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
